version: '3.8'

services:
  # ============================================
  # Base de datos PostgreSQL
  # ============================================
  db:
    image: postgres:15
    container_name: maqui-db
    environment:
      POSTGRES_DB: ${DB_NAME:-maquinariasdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - maqui-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Aplicación Django
  # ============================================
  web:
    build: .
    container_name: maqui-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - maqui-network

  # ============================================
  # pgAdmin (opcional - interfaz visual para PostgreSQL)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: maqui-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maquinarias.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - maqui-network
    # Solo para desarrollo - no usar en producción

  # ============================================
  # Prometheus - Métricas
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: maqui-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - maqui-network

  # ============================================
  # Grafana - Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: maqui-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - maqui-network

networks:
  maqui-network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: