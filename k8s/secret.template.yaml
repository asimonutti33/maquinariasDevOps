# ⚠️ ESTE ARCHIVO ES SOLO UN TEMPLATE - NO CONTIENE SECRETOS REALES
# ⚠️ NO lo apliques directo. Generá el real con el comando abajo y NO lo commitees.
#
# Opción recomendada (no deja el valor en texto plano en un archivo):
#
# kubectl create secret generic django-secret \
#   --namespace=maquinarias \
#   --from-literal=SECRET_KEY='tu-secret-key-larga-y-aleatoria' \
#   --from-literal=DB_USER='postgres' \
#   --from-literal=DB_PASSWORD='tu-password-segura' \
#   --from-literal=DJANGO_SUPERUSER_PASSWORD='tu-password-admin'
#
# Para generar una SECRET_KEY segura de Django:
# python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"

apiVersion: v1
kind: Secret
metadata:
  name: django-secret
  namespace: maquinarias
type: Opaque
stringData:
  SECRET_KEY: "REEMPLAZAR-NO-COMMITEAR-VALOR-REAL"
  DB_USER: "postgres"
  DB_PASSWORD: "REEMPLAZAR-NO-COMMITEAR-VALOR-REAL"
  DJANGO_SUPERUSER_PASSWORD: "REEMPLAZAR-NO-COMMITEAR-VALOR-REAL"
