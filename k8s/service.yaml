apiVersion: v1
kind: Service
metadata:
  name: maquinarias-service
  namespace: maquinarias
spec:
  selector:
    app: maquinarias
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: maquinarias
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP