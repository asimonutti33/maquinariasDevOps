name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/maquinarias-devops

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. BUILD: construye la imagen Docker y la deja lista para los jobs siguientes
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de la imagen (sin push, solo verificar que compila)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKERHUB_IMAGE }}:ci-${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Subir imagen como artifact para los jobs siguientes
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. TEST: validaciones de Django + linting
  #    Nota: el proyecto todavía no tiene tests unitarios (pytest/unittest).
  #    Mientras tanto, este job corre las verificaciones automáticas que
  #    Django sí provee de forma nativa: chequeo del proyecto y detección
  #    de migraciones faltantes. Cuando existan tests reales, agregar aquí
  #    el paso "python manage.py test" o "pytest".
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maquinariasdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint con flake8
        run: |
          flake8 . --count --max-line-length=120 \
            --exclude=venv,migrations,__pycache__,staticfiles \
            --statistics

      - name: Django check (detecta errores de configuración)
        env:
          SECRET_KEY: ci-test-secret-key-no-usar-en-produccion
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost"
          DB_NAME: maquinariasdb_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py check

      - name: Verificar que no hay migraciones pendientes sin generar
        env:
          SECRET_KEY: ci-test-secret-key-no-usar-en-produccion
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost"
          DB_NAME: maquinariasdb_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py makemigrations --check --dry-run

      # ── Placeholder para cuando existan tests reales ──────────────────────
      # - name: Correr tests unitarios
      #   run: python manage.py test

  # ─────────────────────────────────────────────────────────────────────────
  # 3. SCAN: escaneo de vulnerabilidades en la imagen y en dependencias
  # ─────────────────────────────────────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar imagen del job build
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Cargar imagen en Docker
        run: docker load --input /tmp/image.tar

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_IMAGE }}:ci-${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # no bloquea el pipeline; cambiar a "1" para hacerlo estricto

      - name: Auditar dependencias Python con pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  # ─────────────────────────────────────────────────────────────────────────
  # 4. DEPLOY: push a Docker Hub (solo si test y scan pasaron, y solo en main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Push a Docker Hub
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tags (semántico + latest + sha)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=v1.0.${{ github.run_number }}

      - name: Build y push a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
